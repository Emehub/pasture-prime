<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicon -->
    <link rel="icon" href="/logo.jpeg" type="image/jpeg" />
    <link rel="apple-touch-icon" href="/logo.jpeg" />
    <meta name="theme-color" content="#1a3a1a" />

    <!-- SEO -->
    <title>Pasture Prime Ltd — Premium Poultry Processing in Ghana</title>
    <meta
      name="description"
      content="Pasture Prime Ltd is Ghana's trusted poultry processor. We offer farm-gate aggregation, hygienic processing, and distribution of premium fresh and frozen chicken cuts. Supporting smallholder farmers across Ghana."
    />
    <meta name="keywords" content="poultry Ghana, chicken processing Ghana, fresh chicken Ghana, frozen chicken Ghana, poultry supplier Ghana, farm gate aggregation, Pasture Prime, smallholder farmers Ghana, broiler farming Ghana" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://pastureprimeltd.com/" />

    <!-- Open Graph (for Google + social sharing) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://pastureprimeltd.com/" />
    <meta property="og:title" content="Pasture Prime Ltd — Premium Poultry Processing in Ghana" />
    <meta property="og:description" content="Ghana's trusted poultry processor. Farm-gate aggregation, hygienic processing, and distribution of premium fresh and frozen chicken cuts." />
    <meta property="og:image" content="https://pastureprimeltd.com/images/Farmer%20Partnership%20and%20Smart%20Processing.webp" />
    <meta property="og:site_name" content="Pasture Prime Ltd" />

    <!-- Preload LCP hero image (WebP) -->
    <link
      rel="preload"
      href="/images/Farmer%20Partnership%20and%20Smart%20Processing.webp"
      as="image"
      type="image/webp"
      fetchpriority="high"
    />

    <!-- DNS prefetch for YouTube embed -->
    <link rel="dns-prefetch" href="https://www.youtube.com" />
    <link rel="dns-prefetch" href="https://i.ytimg.com" />

    <!-- Fonts: Fraunces (display) + Public Sans (body) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;700&family=Public+Sans:wght@400;500;600;700&display=swap"
      as="style"
      onload="
        this.onload = null
        this.rel = 'stylesheet'
      "
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;700&family=Public+Sans:wght@400;500;600;700&display=swap"
      />
    </noscript>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
